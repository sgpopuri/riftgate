# cargo-deny configuration.
#
# CI runs `cargo deny check` to fail on:
# - License non-compliance (only OSI-approved permissive licenses allowed in
#   the data path; copyleft licenses block).
# - Unmaintained or yanked crates.
# - Known security advisories from the RustSec database.
# - Multiple major versions of the same crate (forces consolidation).

[advisories]
db-path           = "~/.cargo/advisory-db"
db-urls           = ["https://github.com/RustSec/advisory-db"]
yanked            = "deny"
ignore            = []

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
exceptions = []

[[licenses.clarify]]
name       = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards         = "allow"
deny              = []
skip              = []
skip-tree         = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
