# cargo-deny configuration.
#
# CI runs `cargo deny check` to fail on:
# - License non-compliance (only OSI-approved permissive licenses allowed in
#   the data path; copyleft licenses block).
# - Unmaintained or yanked crates.
# - Known security advisories from the RustSec database.
# - Multiple major versions of the same crate (forces consolidation).

[advisories]
db-path           = "~/.cargo/advisory-db"
db-urls           = ["https://github.com/RustSec/advisory-db"]
yanked            = "deny"
ignore            = [
    # Transitively pulled by tonic/opentelemetry today; no safe upgrade is
    # available yet per RustSec advisory metadata.
    "RUSTSEC-2025-0134",
    # wasmtime 31 advisories: the `wasm` feature in riftgate-filter is
    # off-by-default and CI enables it only via --all-features. Upgrading
    # wasmtime 31 → 44+ requires a breaking component-model API migration
    # that needs its own Options doc + ADR before landing. Tracked as
    # tech-debt; do not ship with the wasm feature enabled in production
    # until wasmtime is bumped.
    # paste (transitive via wasmtime macros) marked unmaintained.
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0046",
    "RUSTSEC-2025-0118",
    "RUSTSEC-2026-0006",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0021",
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
    "RUSTSEC-2026-0114",
]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
exceptions = []

[[licenses.clarify]]
name       = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards         = "allow"
deny              = []
skip              = [
    # kube 0.93 (riftgate-operator optional dep) uses thiserror 1.x while
    # our workspace uses thiserror 2.x. Both versions coexist safely.
    { name = "thiserror",      version = "1" },
    { name = "thiserror-impl", version = "1" },
]
skip-tree         = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
