# cargo-deny configuration.
#
# CI runs `cargo deny check` to fail on:
# - License non-compliance (only OSI-approved permissive licenses allowed in
#   the data path; copyleft licenses block).
# - Unmaintained or yanked crates.
# - Known security advisories from the RustSec database.
# - Multiple major versions of the same crate (forces consolidation).

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked  = "deny"
ignore  = [
    # Transitively pulled by tonic/opentelemetry; no safe upgrade available.
    "RUSTSEC-2025-0134",
    # wasmtime 31 advisories: the `wasm` feature in riftgate-filter is
    # off-by-default. Upgrading wasmtime 31 → 44+ requires a breaking
    # component-model API migration (Options doc + ADR needed).
    # All other previously-ignored IDs are now resolved in newer dep versions
    # and have been removed from this list.
]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "CC0-1.0",
]
exceptions = []

[[licenses.clarify]]
name       = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards         = "allow"
deny              = []
skip              = [
    # kube 0.93 (riftgate-operator optional dep) uses thiserror 1.x while
    # our workspace pins thiserror 2.x.
    { name = "thiserror",        version = "1" },
    { name = "thiserror-impl",   version = "1" },
    # Pre-existing transitive duplicates from tonic/opentelemetry/hyper-util:
    { name = "core-foundation",  version = "0.9" },
    { name = "getrandom",        version = "0.2" },
    { name = "hashbrown",        version = "0.12" },
    { name = "hashbrown",        version = "0.14" },
    { name = "indexmap",         version = "1" },
    { name = "socket2",          version = "0.5" },
    { name = "tower",            version = "0.4" },
    { name = "windows-sys",      version = "0.52" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
