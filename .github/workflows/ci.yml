# Riftgate CI pipeline.
#
# Runs on every PR and on every push to main. Mirrors the local developer
# flow: format check, lints, build, tests, docs, security audit, mdbook.
#
# AGENTS.md §11 enforces "no warnings"; this pipeline is the gate.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The workspace MSRV (rust-version in Cargo.toml) is the lower bound the
  # public crates must build against; the contributor channel (rust-toolchain
  # .toml) is what we run CI on.
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Workspace crates (all features, excluding BPF no-std crate and
      # riftgate-operator which pulls in kube/k8s-openapi optional deps).
      - run: cargo clippy --workspace --all-targets --all-features --exclude riftgate-obs-bpf-programs --exclude riftgate-operator -- --deny warnings
      # Operator crate (default features only; kube deps require a live cluster).
      - run: cargo clippy -p riftgate-operator -- --deny warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Workspace crates (all features, excluding BPF and kube-dependent operator).
      - run: cargo test --workspace --all-features --exclude riftgate-obs-bpf-programs --exclude riftgate-operator
      # Operator crate (default features; stub tests always pass without kube).
      - run: cargo test -p riftgate-operator

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - env:
          RUSTDOCFLAGS: --deny warnings
        run: cargo doc --workspace --no-deps --document-private-items --exclude riftgate-obs-bpf-programs --exclude riftgate-operator

  audit:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  mdbook:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: mdbook build
