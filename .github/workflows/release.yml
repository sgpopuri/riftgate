# Riftgate release pipeline.
#
# Triggered on `v*` tags. Builds release binaries and runs the full test
# suite. Does NOT publish to crates.io — registry distribution is deferred
# to the v1.0 retrospective (see docs/02-mvp-roadmap.md § Distribution).

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cargo test --workspace --all-features
