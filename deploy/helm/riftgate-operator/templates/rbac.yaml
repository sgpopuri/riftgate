{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "riftgate-operator.serviceAccountName" . }}
  labels:
    {{- include "riftgate-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "riftgate-operator.fullname" . }}
rules:
  # Read CRDs the operator manages.
  - apiGroups: ["riftgate.io"]
    resources: ["riftgates", "riftgatebackends", "riftgateroutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["riftgate.io"]
    resources: ["riftgates/status"]
    verbs: ["get", "patch", "update"]
  # Manage ConfigMaps (rendered TOML config).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  # Manage Deployments (gateway pods).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  # Read Secrets (auth keys, API keys).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Watch Endpoints for dynamic backend discovery.
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  # Leader election.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "riftgate-operator.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "riftgate-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "riftgate-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
