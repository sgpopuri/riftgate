apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: riftgates.riftgate.io
spec:
  group: riftgate.io
  names:
    kind: Riftgate
    listKind: RiftgateList
    plural: riftgates
    singular: riftgate
    shortNames:
      - rg
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["image"]
              properties:
                image:
                  type: string
                  description: Container image for the Riftgate binary.
                listenAddr:
                  type: string
                  default: "0.0.0.0:8080"
                drainGraceMs:
                  type: integer
                  format: int64
                  default: 30000
                obsEndpoint:
                  type: string
                  default: "http://127.0.0.1:4317"
                replicas:
                  type: integer
                  format: int32
                  default: 1
                  minimum: 1
                logLevel:
                  type: string
                  default: "info"
                  enum: ["error", "warn", "info", "debug", "trace"]
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                  format: int32
                message:
                  type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: riftgatebackends.riftgate.io
spec:
  group: riftgate.io
  names:
    kind: RiftgateBackend
    listKind: RiftgateBackendList
    plural: riftgatebackends
    singular: riftgatebackend
    shortNames:
      - rgb
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                url:
                  type: string
                  description: Static upstream URL (mutually exclusive with serviceRef).
                serviceRef:
                  type: object
                  required: ["name", "port"]
                  properties:
                    name:
                      type: string
                    port:
                      type: integer
                      format: int32
                authSecretRef:
                  type: object
                  required: ["name", "key"]
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                timeoutMs:
                  type: integer
                  format: int32
                  default: 30000
                circuitBreaker:
                  type: object
                  properties:
                    errorThreshold:
                      type: number
                      default: 0.5
                    probeIntervalMs:
                      type: integer
                      format: int32
                      default: 5000
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: riftgateroutes.riftgate.io
spec:
  group: riftgate.io
  names:
    kind: RiftgateRoute
    listKind: RiftgateRouteList
    plural: riftgateroutes
    singular: riftgateroute
    shortNames:
      - rgr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["pathPrefix", "backendRef"]
              properties:
                pathPrefix:
                  type: string
                backendRef:
                  type: string
                weight:
                  type: integer
                  format: int32
                  default: 100
                  minimum: 1
                mcp:
                  type: object
                  properties:
                    enforce:
                      type: boolean
                      default: true
                    allowedTools:
                      type: array
                      items:
                        type: string
                    deniedTools:
                      type: array
                      items:
                        type: string
                    allowedResourcePrefixes:
                      type: array
                      items:
                        type: string
                multitenancy:
                  type: object
                  properties:
                    apiKeySecretRef:
                      type: object
                      required: ["name", "key"]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
